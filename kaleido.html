<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleido — 만화경 페인트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #05060a; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  canvas { display: block; position: fixed; inset: 0; cursor: crosshair; touch-action: none; }
  .panel {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 14px; padding: 10px 16px;
    background: rgba(18,20,28,.7); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,.08); border-radius: 16px;
    color: #cdd3e0; font-size: 13px; user-select: none; z-index: 10;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  .panel label { display: flex; align-items: center; gap: 8px; }
  .panel .sep { width: 1px; height: 24px; background: rgba(255,255,255,.1); }
  input[type=range] { width: 90px; accent-color: #8b9dff; }
  button {
    padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.05); color: #cdd3e0; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: .15s;
  }
  button:hover { background: rgba(255,255,255,.12); }
  button.on { background: linear-gradient(135deg, #8b9dff, #7183f5); color: #0a0c14; border-color: #8b9dff; box-shadow: 0 4px 14px rgba(139,157,255,.3); }
  .val { min-width: 20px; text-align: center; color: #fff; font-weight: 700; }
  .hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    color: rgba(205,211,224,.45); font-size: 12px; z-index: 10; pointer-events: none;
  }
  .home-btn {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.14);
    color: #eef0f6; text-decoration: none;
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    transition: .15s;
  }
  .home-btn:hover { background: rgba(255,255,255,.16); transform: translateY(-1px); }
</style>
</head>
<body>
  <a href="index.html" class="home-btn" aria-label="홈으로" title="홈으로">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
  </a>
  <canvas id="c"></canvas>
  <div class="panel">
    <label>대칭 <span class="val" id="segVal">8</span>
      <input type="range" id="seg" min="2" max="16" value="8" step="1">
    </label>
    <div class="sep"></div>
    <label>굵기
      <input type="range" id="size" min="1" max="24" value="6">
    </label>
    <div class="sep"></div>
    <button id="rainbow" class="on">무지개</button>
    <button id="mirror" class="on">거울</button>
    <div class="sep"></div>
    <button id="clear">지우기</button>
    <button id="save">저장</button>
  </div>
  <div class="hint">마우스로 드래그해서 그려보세요 · 중심에서 대칭으로 퍼집니다</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', ()=>{ const img = ctx.getImageData(0,0,canvas.width,canvas.height); resize(); ctx.putImageData(img,0,0); });

let segments = 8, brush = 6, rainbow = true, mirror = true, hue = 0;
let drawing = false, last = null;

const segEl = document.getElementById('seg');
segEl.oninput = e => { segments = +e.target.value; document.getElementById('segVal').textContent = segments; };
document.getElementById('size').oninput = e => brush = +e.target.value;
document.getElementById('rainbow').onclick = e => { rainbow=!rainbow; e.target.classList.toggle('on',rainbow); };
document.getElementById('mirror').onclick = e => { mirror=!mirror; e.target.classList.toggle('on',mirror); };
document.getElementById('clear').onclick = ()=> ctx.clearRect(0,0,W,H);
document.getElementById('save').onclick = ()=>{
  const bg = document.createElement('canvas'); bg.width=W; bg.height=H;
  const bx = bg.getContext('2d'); bx.fillStyle='#05060a'; bx.fillRect(0,0,W,H); bx.drawImage(canvas,0,0);
  const a = document.createElement('a'); a.download='kaleido.png'; a.href=bg.toDataURL(); a.click();
};

function pos(e){
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - cx, y: t.clientY - cy };
}
function drawStroke(from, to){
  const color = rainbow ? `hsl(${hue % 360}, 90%, 62%)` : '#e8ecff';
  ctx.strokeStyle = color;
  ctx.lineWidth = brush;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 12; ctx.shadowColor = color;
  const step = (Math.PI * 2) / segments;
  for(let i=0;i<segments;i++){
    const a = step * i;
    const cos = Math.cos(a), sin = Math.sin(a);
    const rot = (x,y)=>({ x: x*cos - y*sin, y: x*sin + y*cos });
    const f = rot(from.x, from.y), t = rot(to.x, to.y);
    ctx.beginPath(); ctx.moveTo(cx+f.x, cy+f.y); ctx.lineTo(cx+t.x, cy+t.y); ctx.stroke();
    if(mirror){
      ctx.beginPath(); ctx.moveTo(cx-f.x, cy+f.y); ctx.lineTo(cx-t.x, cy+t.y); ctx.stroke();
    }
  }
  hue += 2.5;
}
function down(e){ drawing = true; last = pos(e); e.preventDefault(); }
function move(e){ if(!drawing) return; const p = pos(e); drawStroke(last, p); last = p; e.preventDefault(); }
function up(){ drawing = false; last = null; }

canvas.addEventListener('mousedown', down);
canvas.addEventListener('mousemove', move);
window.addEventListener('mouseup', up);
canvas.addEventListener('touchstart', down, {passive:false});
canvas.addEventListener('touchmove', move, {passive:false});
window.addEventListener('touchend', up);
</script>
</body>
</html>
